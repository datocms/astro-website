on:
  workflow_call:
    secrets:
      DATOCMS_API_TOKEN:
        required: true
    inputs:
      environment:
        required: true
        type: string
      strategy:
        required: false
        type: string
        default: rolling
      release-tag:
        required: false
        type: string
        default: ''
      no-cache:
        required: false
        type: boolean
        default: false

env:
  DATOCMS_API_TOKEN: ${{ secrets.DATOCMS_API_TOKEN }}

jobs:
  deploy:
    name: Deploy on ${{ inputs.environment }}
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm

    permissions:
      id-token: write # This is required for requesting the JWT from AWS using OIDC
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: List files
        run: ls -a

      # QEMU is only needed for cross-arch emulation. We build ARM on an ARM
      # runner, so it's omitted on purpose.

      # Setup Buildx (docker-container driver, required to export the local cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Cache Docker BuildKit layers.
      # cubo builds with `--cache-to type=local,dest=/tmp/.buildx-cache,mode=max`,
      # so we persist that directory between runs. The key is unique per commit so
      # the post-job save ALWAYS fires (actions/cache skips saving on a key hit),
      # and restore-keys seeds each build from the most recent cache on the branch
      # (falling back to any branch). On Blacksmith runners actions/cache
      # transparently uses their colocated backend — no package swap needed.
      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ github.ref_name }}-
            ${{ runner.os }}-buildx-

      # 4) Log in to GitHub Container Registry (for the `docker push` executed by `cubo deploy`)
      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      # The actual app build happens inside Docker, so the runner only needs the
      # `cubo` CLI — not the full ~1GB dependency tree. Install it globally,
      # reading the exact version straight from the lockfile so it stays in sync
      # automatically when @datocms/cubo is bumped.
      - name: Install cubo
        shell: bash
        run: |
          CUBO_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/@datocms/cubo'].version")
          echo "Installing @datocms/cubo@$CUBO_VERSION"
          npm install -g "@datocms/cubo@$CUBO_VERSION"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::734741016184:role/github-actions-deploy
          aws-region: eu-west-1

      - name: Deploy
        shell: bash
        run: |
          CMD="cubo deploy \
            --env '${{ inputs.environment }}' \
            --strategy '${{ inputs.strategy }}'"

          if [ -n "${{ inputs.release-tag }}" ]; then
            CMD="$CMD --release-tag '${{ inputs.release-tag }}'"
          fi

          if ${{ inputs.no-cache }}; then
            CMD="$CMD --no-cache"
          fi

          echo "➤ $CMD"
          eval $CMD

      - name: Invalidate CDN
        run: cubo run 'npm run invalidate-everything' --env '${{ inputs.environment }}'
